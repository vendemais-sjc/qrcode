<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - GitHub</title>
    <style>
        /* Mesmo CSS anterior - mantém tudo */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .main-content {
            padding: 40px;
        }

        .input-section {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .option-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
        }

        .option-item select, .option-item input[type="color"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .qrcode-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 20px;
            margin-top: 30px;
        }

        .qrcode-container.hidden {
            display: none;
        }

        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        #qrcode canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .download-btn {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }

        .svg-btn {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
        }

        .copy-btn {
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
        }

        .error-message {
            color: #e53e3e;
            background: #fed7d7;
            border: 1px solid #fc8181;
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            display: none;
        }

        .generate-btn.loading .loading-spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #718096;
            border-top: 2px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 QR Code Generator</h1>
            <p>Funcionando no GitHub Pages! 🚀</p>
        </div>

        <div class="main-content">
            <div class="input-section">
                <div class="input-group">
                    <label for="qr-input">📝 Conteúdo do QR Code</label>
                    <input type="text" 
                           id="qr-input" 
                           class="input-field"
                           placeholder="Digite texto, URL, telefone..."
                           value="https://github.com">
                </div>

                <div class="options-grid">
                    <div class="option-item">
                        <label>📏 Tamanho</label>
                        <select id="qr-size">
                            <option value="150">150x150</option>
                            <option value="250" selected>250x250</option>
                            <option value="350">350x350</option>
                            <option value="500">500x500</option>
                        </select>
                    </div>

                    <div class="option-item">
                        <label>⚫ Cor Principal</label>
                        <input type="color" id="qr-color-dark" value="#000000">
                    </div>

                    <div class="option-item">
                        <label>⚪ Cor de Fundo</label>
                        <input type="color" id="qr-color-light" value="#ffffff">
                    </div>
                </div>

                <button class="generate-btn" onclick="generateQR()" id="generate-btn">
                    <span class="loading-spinner"></span>
                    <span>✨ Gerar QR Code ✨</span>
                </button>
            </div>

            <div id="qrcode-container" class="qrcode-container hidden">
                <div id="qrcode"></div>
                
                <div class="action-buttons">
                    <button class="action-btn download-btn" onclick="downloadQR()">
                        ⬇️ Baixar PNG
                    </button>
                    <button class="action-btn copy-btn" onclick="copyQR()">
                        📋 Copiar
                    </button>
                </div>
            </div>

            <div class="error-message" id="error-message"></div>
        </div>
    </div>

    <!-- Usando CDN confiável e testado -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    
    <script>
        // Versão simplificada e garantida para GitHub
        let currentQRCanvas = null;
        
        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 3000);
        }

        function generateQR() {
            const input = document.getElementById('qr-input');
            const text = input.value.trim();
            const size = parseInt(document.getElementById('qr-size').value);
            const darkColor = document.getElementById('qr-color-dark').value;
            const lightColor = document.getElementById('qr-color-light').value;
            const generateBtn = document.getElementById('generate-btn');
            const qrcodeDiv = document.getElementById('qrcode');
            const container = document.getElementById('qrcode-container');
            
            // Validação
            if (!text) {
                showError('Digite algum conteúdo!');
                return;
            }
            
            // Loading
            generateBtn.classList.add('loading');
            generateBtn.disabled = true;
            
            // Limpa anterior
            qrcodeDiv.innerHTML = '';
            
            try {
                // Criar QR Code com a biblioteca
                const qr = qrcode(0, 'M');
                qr.addData(text);
                qr.make();
                
                // Criar canvas manualmente
                const canvas = document.createElement('canvas');
                const cellSize = size / qr.getModuleCount();
                
                canvas.width = size;
                canvas.height = size;
                
                const ctx = canvas.getContext('2d');
                
                // Desenhar fundo
                ctx.fillStyle = lightColor;
                ctx.fillRect(0, 0, size, size);
                
                // Desenhar QR Code
                ctx.fillStyle = darkColor;
                for (let row = 0; row < qr.getModuleCount(); row++) {
                    for (let col = 0; col < qr.getModuleCount(); col++) {
                        if (qr.isDark(row, col)) {
                            ctx.fillRect(
                                col * cellSize, 
                                row * cellSize, 
                                cellSize, 
                                cellSize
                            );
                        }
                    }
                }
                
                canvas.id = 'qr-canvas';
                qrcodeDiv.appendChild(canvas);
                
                currentQRCanvas = canvas;
                container.classList.remove('hidden');
                
            } catch (error) {
                console.error('Erro:', error);
                showError('Erro ao gerar QR Code');
            } finally {
                generateBtn.classList.remove('loading');
                generateBtn.disabled = false;
            }
        }

        function downloadQR() {
            if (!currentQRCanvas) {
                showError('Gere um QR Code primeiro!');
                return;
            }

            try {
                const link = document.createElement('a');
                link.download = `qrcode-${Date.now()}.png`;
                link.href = currentQRCanvas.toDataURL('image/png');
                link.click();
            } catch (error) {
                showError('Erro ao baixar');
            }
        }

        function copyQR() {
            if (!currentQRCanvas) {
                showError('Gere um QR Code primeiro!');
                return;
            }

            try {
                currentQRCanvas.toBlob(async (blob) => {
                    try {
                        await navigator.clipboard.write([
                            new ClipboardItem({
                                [blob.type]: blob
                            })
                        ]);
                        
                        const copyBtn = document.querySelector('.copy-btn');
                        const originalText = copyBtn.innerHTML;
                        copyBtn.innerHTML = '✅ Copiado!';
                        setTimeout(() => {
                            copyBtn.innerHTML = originalText;
                        }, 2000);
                        
                    } catch (err) {
                        showError('Não foi possível copiar');
                    }
                });
            } catch (error) {
                showError('Erro ao copiar');
            }
        }

        // Gerar QR Code inicial
        window.onload = function() {
            generateQR();
            
            // Enter para gerar
            document.getElementById('qr-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    generateQR();
                }
            });
        };
    </script>
</body>
</html>
