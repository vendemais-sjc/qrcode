<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Pro - Gerador Profissional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            font-weight: 300;
        }

        .header-icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .main-content {
            padding: 40px;
        }

        .input-section {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-field.error {
            border-color: #fc8181;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .option-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
        }

        .option-item label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
            font-size: 0.9em;
        }

        .option-item select, .option-item input[type="color"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .option-item input[type="color"] {
            height: 45px;
            padding: 5px;
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: linear-gradient(135deg, #a0aec0 0%, #718096 100%);
        }

        .qrcode-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 20px;
            margin-top: 30px;
            transition: all 0.3s;
        }

        .qrcode-container.hidden {
            opacity: 0;
            transform: scale(0.9);
        }

        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        #qrcode canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .download-btn {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(72, 187, 120, 0.4);
        }

        .copy-btn {
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
            box-shadow: 0 5px 15px rgba(66, 153, 225, 0.3);
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(66, 153, 225, 0.4);
        }

        .svg-btn {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
            box-shadow: 0 5px 15px rgba(237, 137, 54, 0.3);
        }

        .svg-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(237, 137, 54, 0.4);
        }

        .error-message {
            color: #e53e3e;
            background: #fed7d7;
            border: 1px solid #fc8181;
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            display: none;
        }

        .generate-btn.loading .loading-spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #718096;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #718096;
            font-size: 0.9em;
            border-top: 2px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">📱</div>
            <h1>QR Code Pro</h1>
            <p>Gerador profissional de QR Codes com estilo e personalização</p>
        </div>

        <div class="main-content">
            <div class="input-section">
                <div class="input-group">
                    <label for="qr-input">📝 Conteúdo do QR Code</label>
                    <input type="text" 
                           id="qr-input" 
                           class="input-field"
                           placeholder="Digite texto, URL, telefone, email..."
                           value="https://exemplo.com">
                </div>

                <div class="options-grid">
                    <div class="option-item">
                        <label>📏 Tamanho</label>
                        <select id="qr-size">
                            <option value="150">150x150 (Pequeno)</option>
                            <option value="250" selected>250x250 (Médio)</option>
                            <option value="350">350x350 (Grande)</option>
                            <option value="500">500x500 (Extra Grande)</option>
                            <option value="800">800x800 (Máximo)</option>
                        </select>
                    </div>

                    <div class="option-item">
                        <label>🔲 Nível de Correção</label>
                        <select id="qr-error-level">
                            <option value="L">L - Baixo (7%)</option>
                            <option value="M" selected>M - Médio (15%)</option>
                            <option value="Q">Q - Alto (25%)</option>
                            <option value="H">H - Máximo (30%)</option>
                        </select>
                    </div>

                    <div class="option-item">
                        <label>⚫ Cor Principal</label>
                        <input type="color" id="qr-color-dark" value="#000000">
                    </div>

                    <div class="option-item">
                        <label>⚪ Cor de Fundo</label>
                        <input type="color" id="qr-color-light" value="#ffffff">
                    </div>
                </div>

                <button class="generate-btn" onclick="generateQR()" id="generate-btn">
                    <span class="loading-spinner"></span>
                    <span>✨ Gerar QR Code Agora ✨</span>
                </button>
            </div>

            <div id="qrcode-container" class="qrcode-container hidden">
                <div id="qrcode"></div>
                
                <div class="action-buttons">
                    <button class="action-btn download-btn" onclick="downloadQR('png')" id="download-png">
                        ⬇️ Baixar PNG
                    </button>
                    <button class="action-btn svg-btn" onclick="downloadQR('svg')" id="download-svg">
                        🎨 Baixar SVG
                    </button>
                    <button class="action-btn copy-btn" onclick="copyQR()" id="copy-btn">
                        📋 Copiar
                    </button>
                </div>
            </div>

            <div class="error-message" id="error-message"></div>

            <div class="stats" id="stats">
                <div class="stat-item">
                    <div class="stat-value" id="qr-version">-</div>
                    <div class="stat-label">Versão</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="qr-characters">0</div>
                    <div class="stat-label">Caracteres</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="qr-capacity">-</div>
                    <div class="stat-label">Capacidade</div>
                </div>
            </div>

            <div class="footer">
                <p>⚡ Gerado com a melhor tecnologia | QR Code Pro v2.0 ⚡</p>
            </div>
        </div>
    </div>

    <!-- Biblioteca QR Code moderna -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    
    <script>
        let currentQRCanvas = null;
        let currentQRData = null;
        
        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 3000);
        }

        function updateStats(text) {
            const charCount = text.length;
            document.getElementById('qr-characters').textContent = charCount;
            
            // Capacidade aproximada baseada no nível de correção
            const errorLevel = document.getElementById('qr-error-level').value;
            let capacity;
            switch(errorLevel) {
                case 'L': capacity = '~2,950'; break;
                case 'M': capacity = '~2,330'; break;
                case 'Q': capacity = '~1,660'; break;
                case 'H': capacity = '~1,270'; break;
                default: capacity = '~2,330';
            }
            document.getElementById('qr-capacity').textContent = capacity;
            
            // Versão estimada (simplificado)
            if (charCount < 100) document.getElementById('qr-version').textContent = '1-2';
            else if (charCount < 500) document.getElementById('qr-version').textContent = '3-6';
            else if (charCount < 1500) document.getElementById('qr-version').textContent = '7-14';
            else document.getElementById('qr-version').textContent = '15-40';
        }

        async function generateQR() {
            const input = document.getElementById('qr-input');
            const text = input.value.trim();
            const size = parseInt(document.getElementById('qr-size').value);
            const darkColor = document.getElementById('qr-color-dark').value;
            const lightColor = document.getElementById('qr-color-light').value;
            const errorLevel = document.getElementById('qr-error-level').value;
            const generateBtn = document.getElementById('generate-btn');
            const qrcodeDiv = document.getElementById('qrcode');
            const container = document.getElementById('qrcode-container');
            
            // Validação
            input.classList.remove('error');
            
            if (!text) {
                input.classList.add('error');
                showError('Por favor, digite algum conteúdo para o QR Code!');
                return;
            }
            
            // Loading state
            generateBtn.classList.add('loading');
            generateBtn.disabled = true;
            
            // Limpa QR Code anterior
            qrcodeDiv.innerHTML = '';
            
            try {
                // Atualiza estatísticas
                updateStats(text);
                
                // Opções de configuração
                const options = {
                    width: size,
                    margin: 2,
                    color: {
                        dark: darkColor,
                        light: lightColor
                    },
                    errorCorrectionLevel: errorLevel
                };
                
                // Gera QR Code como Canvas
                const canvas = await QRCode.toCanvas(text, options);
                
                // Adiciona ao DOM
                canvas.id = 'qr-canvas';
                qrcodeDiv.appendChild(canvas);
                
                // Guarda referência
                currentQRCanvas = canvas;
                
                // Prepara dados para outros formatos
                currentQRData = {
                    text: text,
                    options: options
                };
                
                // Mostra container
                container.classList.remove('hidden');
                
            } catch (error) {
                console.error('Erro:', error);
                showError('Erro ao gerar QR Code. Tente novamente.');
            } finally {
                // Remove loading state
                generateBtn.classList.remove('loading');
                generateBtn.disabled = false;
            }
        }

        async function downloadQR(format) {
            if (!currentQRCanvas) {
                showError('Primeiro gere um QR Code!');
                return;
            }

            try {
                if (format === 'png') {
                    // Download como PNG
                    const link = document.createElement('a');
                    link.download = `qrcode-${Date.now()}.png`;
                    link.href = currentQRCanvas.toDataURL('image/png');
                    link.click();
                } else if (format === 'svg') {
                    // Gera SVG
                    const text = currentQRData.text;
                    const options = currentQRData.options;
                    
                    const svgString = await QRCode.toString(text, {
                        ...options,
                        type: 'svg'
                    });
                    
                    // Download como SVG
                    const blob = new Blob([svgString], { type: 'image/svg+xml' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `qrcode-${Date.now()}.svg`;
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                }
            } catch (error) {
                console.error('Erro no download:', error);
                showError('Erro ao baixar QR Code.');
            }
        }

        async function copyQR() {
            if (!currentQRCanvas) {
                showError('Primeiro gere um QR Code!');
                return;
            }

            try {
                // Converte canvas para blob e copia
                const blob = await new Promise(resolve => currentQRCanvas.toBlob(resolve));
                await navigator.clipboard.write([
                    new ClipboardItem({
                        [blob.type]: blob
                    })
                ]);
                
                // Feedback visual
                const copyBtn = document.getElementById('copy-btn');
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '✅ Copiado!';
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                }, 2000);
                
            } catch (error) {
                console.error('Erro ao copiar:', error);
                showError('Erro ao copiar imagem. Tente baixar.');
            }
        }

        // Gera QR Code inicial
        window.onload = function() {
            generateQR();
            
            // Atualiza estatísticas enquanto digita
            document.getElementById('qr-input').addEventListener('input', function(e) {
                updateStats(e.target.value);
            });
            
            // Atalho de teclado (Enter para gerar)
            document.getElementById('qr-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    generateQR();
                }
            });
        };
    </script>
</body>
</html>
